<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="240" height="240" role="img" aria-label="gold die">
  <defs>
    <!-- Drop shadow only — no outer glow -->
    <filter id="shadow" x="-20%" y="-10%" width="160%" height="160%">
      <feDropShadow dx="2" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <!-- Top face gradient (specular) -->
    <linearGradient id="topGrad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFF3AA"   stop-opacity="1"/>
      <stop offset="45%"  stop-color="#FFE066"  stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFE066"  stop-opacity="0.82"/>
    </linearGradient>
    <!-- Left face gradient -->
    <linearGradient id="leftGrad-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#BB7700"  stop-opacity="1"/>
      <stop offset="100%" stop-color="#885500" stop-opacity="1"/>
    </linearGradient>
    <!-- Scanline overlay -->
    <pattern id="scanlines-gold" x="0" y="0" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" y="0" fill="black" opacity="0.07"/>
    </pattern>
  </defs>

  <style>
    .die-shell { filter: url(#shadow); }
  </style>

  <!-- Cube body (shadow pass) -->
  <g class="die-shell">
    <polygon points="110,40 190,80 190,160 110,200 30,160 30,80" fill="#885500" stroke="none"/>
  </g>

  <!-- ── Three faces ── -->
  <g>
    <!-- Top face -->
    <polygon points="30,80 110,40 190,80 110,120"
      fill="url(#topGrad-gold)" stroke="#1a1000" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Left face -->
    <polygon points="30,80 110,120 110,200 30,160"
      fill="url(#leftGrad-gold)" stroke="#1a1000" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Right face -->
    <polygon points="110,120 190,80 190,160 110,200"
      fill="#CC8800" stroke="#1a1000" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- Scanline texture overlay -->
    <polygon points="30,80 110,40 190,80 110,120"
      fill="url(#scanlines-gold)" opacity="0.5"/>
    <polygon points="30,80 110,120 110,200 30,160"
      fill="url(#scanlines-gold)" opacity="0.5"/>
    <polygon points="110,120 190,80 190,160 110,200"
      fill="url(#scanlines-gold)" opacity="0.5"/>

    <!-- Rim highlights -->
    <line x1="30"  y1="80"  x2="110" y2="40"  stroke="#00000088" stroke-width="3"   opacity="1"/>
    <line x1="110" y1="40"  x2="190" y2="80"  stroke="#FFF3AA"  stroke-width="1.5" opacity="0.6"/>
    <line x1="30"  y1="80"  x2="30"  y2="160" stroke="#00000088" stroke-width="3"   opacity="1"/>
  </g>

  <!-- ── Pips ── -->
  <g>
    <circle cx="150.00" cy="140.00" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
  </g>
  <g>
    <circle cx="92.40" cy="128.80" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
        <circle cx="70.00" cy="140.00" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
        <circle cx="47.60" cy="151.20" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
  </g>
  <g>
    <circle cx="65.20" cy="80.00" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
        <circle cx="110.00" cy="57.60" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
        <circle cx="110.00" cy="80.00" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
        <circle cx="110.00" cy="102.40" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
        <circle cx="154.80" cy="80.00" r="6.5" fill="#FFFFFF" stroke="#00000066" stroke-width="1.5"/>
  </g>
</svg>