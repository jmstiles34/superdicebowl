name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, Type-check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force

      # Runs Biome only. ESLint has a backlog of preexisting errors in the
      # source code (svelte/no-navigation-without-resolve, noNonNullAssertion,
      # etc.) that need their own cleanup pass before it can join CI.
      # See docs/testing.md.
      - name: Lint (Biome)
        run: npm run lint:ci

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build
